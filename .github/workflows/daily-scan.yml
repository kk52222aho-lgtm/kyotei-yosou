name: daily-scan
# 早朝JSTに settle(結果反映)→scan(今日の妙味)→log(台帳)→push。PC不要でサイト自動更新。
# cronは常にUTC(workflow内のTZ:Asia/Tokyoはcron解釈に効かない)。
# 旧 '0 0 * * *'(=00:00 UTC/09:00 JST)は世界のcronが殺到する最混雑スロットで
# GitHubのschedule遅延が常時+2h(07-07〜09で実測11時更新)→9時前に更新されず。
# 閑散時刻(22 UTC)＋非正時(:47)へ移し、予定を7:47 JSTに前倒しして残延バッファも確保。
on:
  schedule:
    - cron: '47 22 * * *'   # 22:47 UTC = 07:47 JST（混雑回避で遅延を最小化）
  workflow_dispatch:        # 手動実行も可

permissions:
  contents: write           # GITHUB_TOKENでリポジトリにpushする権限

concurrency:
  group: repo-write         # ev-captureと直列化してpush衝突を防ぐ
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo         # dt.date.today()等を全部JSTに
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # 日次jobに必要な依存のみ(streamlit除く)。model.joblibのsklearnは1.6.1固定必須
      - run: pip install pandas "numpy<2" scikit-learn==1.6.1 joblib requests beautifulsoup4 lxml
      - name: settle + scan + log
        run: |
          python -m src.papertrade settle || echo "settle skipped"
          python -m src.scan
          python -m src.papertrade log
      # 空データ検知: HTTP通ったがデータ0件(IPブロック/パース破損)や鮮度切れを非ゼロ終了で失敗通知に乗せる。
      # commit前に置く → 壊れた空スキャンをサイトに公開せず、ここで止めてGH失敗メールを飛ばす。
      - name: healthcheck (empty-data / freshness assertion)
        run: python -m src.healthcheck
      - name: commit + push
        run: |
          git config user.name "kyotei-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/today_picks.json data/papertrade.jsonl
          git commit -m "cloud daily $(date +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase --autostash || true
          git push
      # 死活監視: 全ステップ成功時のみ healthchecks.io にping。cronスキップ/リポジトリ無効化/
      # IPブロックでのハード失敗ではpingが来ず、healthchecks側が期待間隔超過でメール警告。
      # secret HEALTHCHECK_DAILY(=https://hc-ping.com/<uuid>) 未設定なら黙ってskip(壊さない)。
      - name: ping healthchecks.io (liveness)
        if: success()
        run: |
          if [ -n "${{ secrets.HEALTHCHECK_DAILY }}" ]; then
            curl -fsS -m 10 --retry 3 "${{ secrets.HEALTHCHECK_DAILY }}" && echo "pinged" || echo "ping failed (non-fatal)"
          else
            echo "HEALTHCHECK_DAILY secret 未設定 — ping省略。死活メールを有効化するには設定を。"
          fi
